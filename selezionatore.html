<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMAS Aeromeccanica – Selezionatore Aspiratori</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #1a2a3a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 3px solid #1b3b7a;
      padding: 18px 40px;
      display: flex;
      align-items: center;
    }
    header img { height: 64px; }

    main {
      max-width: 720px;
      margin: 48px auto;
      padding: 0 20px;
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1b3b7a;
      margin-bottom: 24px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(27,59,122,0.08);
      padding: 32px 36px;
      margin-bottom: 28px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 28px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4a6080;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #c8d6e8;
      border-radius: 6px;
      font-size: 1rem;
      color: #1a2a3a;
      background: #f8fafd;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      outline: none;
      border-color: #1b3b7a;
      background: #fff;
    }

    .unit {
      font-size: 0.72rem;
      color: #8fa0b8;
      margin-top: 4px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e4eaf2;
      margin: 24px 0;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }
    button:active { transform: scale(0.98); }

    #btn-find {
      background: #1b3b7a;
      color: #fff;
    }
    #btn-find:hover { background: #14306a; }

    #btn-calc {
      background: #e8eef7;
      color: #1b3b7a;
    }
    #btn-calc:hover { background: #d4dff0; }

    #risultati {
      display: none;
    }

    .risultati-header {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #4a6080;
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8fa0b8;
      padding: 6px 10px;
      border-bottom: 2px solid #e4eaf2;
    }
    td {
      padding: 10px 10px;
      font-size: 0.92rem;
      border-bottom: 1px solid #f0f4f8;
    }
    tr:last-child td { border-bottom: none; }

    .badge-ok {
      display: inline-block;
      background: #e6f4ea;
      color: #2d7a3e;
      border-radius: 4px;
      padding: 2px 10px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .badge-no {
      display: inline-block;
      background: #fdecea;
      color: #b93030;
      border-radius: 4px;
      padding: 2px 10px;
      font-size: 0.82rem;
    }

    .msg-error {
      background: #fff3cd;
      border-left: 4px solid #f0a500;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 0.9rem;
      color: #7a5000;
      margin-top: 8px;
    }

    #portata-calc {
      margin-top: 10px;
      background: #e8f0fb;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.9rem;
      color: #1b3b7a;
      font-weight: 600;
      display: none;
    }
  </style>
</head>

<main>
  <div class="card">

      <div>
        <label for="portata">Portata</label>

        <div class="unit">m³/h</div>
      </div>
      <div>

        <input type="number" id="prevalenza" placeholder="es. 90" min="0" step="any">
        <div class="unit">mmH₂O</div>
      </div>
    </div>

    <hr class="divider">

    <div class="grid-2">
      <div>
        <label for="velocita">Velocità aria</label>

        <div class="unit">m/s</div>
      </div>
      <div>
        <label for="diametro">Diametro condotto</label>
        <input type="number" id="diametro" placeholder="es. 200" min="0" step="any">
        <div class="unit">mm</div>
      </div>
    </div>

    <div id="portata-calc"></div>

    <div class="btn-row" style="margin-top:24px;">
      <button id="btn-calc" onclick="calcolaPortata()">Calcola portata</button>
      <button id="btn-find" onclick="trovaTutti()">Trova aspiratore</button>

          <th>Modello</th>

      </thead>

    </table>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let aspiratori = {};

async function caricaExcel() {
  try {
    const resp = await fetch('RH.xlsx');
    if (!resp.ok) throw new Error('File RH.xlsx non trovato nella repository.');
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    wb.SheetNames.forEach(nome => {
      const ws = wb.Sheets[nome];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: 0 });
      if (!raw || raw.length < 2) return;
      // Prima riga = intestazioni
      const intestazione = raw[0];
      const righe = raw.slice(1);
      // Colonne 0-4: info modello; colonne 5+: portate numeriche
      const portate = intestazione.slice(5).map(v => parseFloat(v)).filter(v => !isNaN(v));
      aspiratori[nome] = { portate, righe };
    });
    console.log('Excel caricato:', Object.keys(aspiratori));
  } catch(e) {
    console.warn(e.message);
  }
}

function trovaAspiratore(foglio, q, p) {
  const { portate, righe } = foglio;
  const minPortata = Math.min(...portate.filter(v => v > 0));
  if (q < minPortata) return null;

  // Trova indice colonna più vicina a q
  let idxCol = 0;
  let minDiff = Infinity;
  portate.forEach((val, i) => {
    const d = Math.abs(val - q);
    if (d < minDiff) { minDiff = d; idxCol = i; }
  });

  // Cerca riga con valore >= p (esclude 0)
  let best = null;
  let bestDiff = Infinity;
  righe.forEach(riga => {
    const valCol = parseFloat(riga[5 + idxCol]);
    if (!valCol || valCol <= 0) return;
    const diff = valCol - p;
    if (diff >= 0 && diff < bestDiff) {
      bestDiff = diff;
      best = riga[0]; // nome modello colonna 0
    }
  });
  return best;
}

function trovaTutti() {
  const q = parseFloat(document.getElementById('portata').value);
  const p = parseFloat(document.getElementById('prevalenza').value);

  if (isNaN(q) || isNaN(p) || q <= 0 || p <= 0) {
    alert('Inserisci valori validi per portata e perdita di carico.');
    return;
  }
  if (Object.keys(aspiratori).length === 0) {
    alert('Dati non ancora caricati. Ricarica la pagina.');
    return;
  }

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  Object.entries(aspiratori).forEach(([nome, foglio]) => {
    const modello = trovaAspiratore(foglio, q, p);
    const tr = document.createElement('tr');
    const tdNome = document.createElement('td');
    tdNome.textContent = nome;
    const tdMod = document.createElement('td');
    if (modello) {
      const badge = document.createElement('span');
      badge.className = 'badge-ok';
      badge.textContent = modello;
      tdMod.appendChild(badge);
    } else {
      const badge = document.createElement('span');
      badge.className = 'badge-no';
      badge.textContent = 'Nessun modello';
      tdMod.appendChild(badge);
    }
    tr.appendChild(tdNome);
    tr.appendChild(tdMod);
    tbody.appendChild(tr);
  });

  document.getElementById('risultati').style.display = 'block';
}

function calcolaPortata() {
  const v = parseFloat(document.getElementById('velocita').value);
  const d = parseFloat(document.getElementById('diametro').value);
  if (isNaN(v) || isNaN(d) || v <= 0 || d <= 0) {
    alert('Inserisci velocità e diametro validi.');
    return;
  }
  const dm = d / 1000;
  const q = (dm * dm * v * Math.PI / 4) * 3600;
  const div = document.getElementById('portata-calc');
  div.style.display = 'block';
  div.textContent = '→ Portata calcolata: ' + q.toFixed(1) + ' m³/h';
  document.getElementById('portata').value = q.toFixed(1);
}

caricaExcel();
</script>
